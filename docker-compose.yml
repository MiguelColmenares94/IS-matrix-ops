services:
  migrate:
    build: ./db
    environment:
      DATABASE_URL: ${DATABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - matrix-ops-network

  api-go:
    build: ./api-go
    env_file: .env
    environment:
      PORT: "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - matrix-ops-network

  api-node:
    build: ./api-node
    env_file: .env
    environment:
      PORT: "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - matrix-ops-network

  frontend:
    build: ./frontend
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - matrix-ops-network

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - api-go
      - api-node
      - frontend
    networks:
      - matrix-ops-network

  test-api-go:
    build: ./api-go
    command: go test ./...
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["test"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - matrix-ops-network

  test-api-node:
    build: ./api-node
    command: npm test
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["test"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - matrix-ops-network

networks:
  matrix-ops-network:
    driver: bridge
